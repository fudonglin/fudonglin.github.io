<svg width="680" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
  <title>Grid game board with robot, diamond, wall, and fire</title>
  <desc>A 4x3 game grid. Robot at position 3,1 with directional arrows. Start at 1,1. Stone wall at 2,2. Diamond +1 reward at 4,3. Fire -1 penalty at 4,2.</desc>

  <!-- Background -->
  <rect x="40" y="40" width="600" height="460" rx="12" fill="#7a7461" stroke="#5c5647" stroke-width="3"/>
  <rect x="44" y="44" width="592" height="452" rx="10" fill="none" stroke="#6b6555" stroke-width="1.5"/>

  <!-- Grid lines - vertical -->
  <line x1="190" y1="44" x2="190" y2="492" stroke="#5c5647" stroke-width="2"/>
  <line x1="340" y1="44" x2="340" y2="492" stroke="#5c5647" stroke-width="2"/>
  <line x1="490" y1="44" x2="490" y2="492" stroke="#5c5647" stroke-width="2"/>

  <!-- Grid lines - horizontal -->
  <line x1="44" y1="194" x2="636" y2="194" stroke="#5c5647" stroke-width="2"/>
  <line x1="44" y1="344" x2="636" y2="344" stroke="#5c5647" stroke-width="2"/>

  <!-- Row labels -->
  <text x="20" y="420" font-family="sans-serif" font-size="22" font-weight="500" fill="#333" text-anchor="middle">1</text>
  <text x="20" y="270" font-family="sans-serif" font-size="22" font-weight="500" fill="#333" text-anchor="middle">2</text>
  <text x="20" y="120" font-family="sans-serif" font-size="22" font-weight="500" fill="#333" text-anchor="middle">3</text>

  <!-- Column labels -->
  <text x="115" y="530" font-family="sans-serif" font-size="22" font-weight="500" fill="#333" text-anchor="middle">1</text>
  <text x="265" y="530" font-family="sans-serif" font-size="22" font-weight="500" fill="#333" text-anchor="middle">2</text>
  <text x="415" y="530" font-family="sans-serif" font-size="22" font-weight="500" fill="#333" text-anchor="middle">3</text>
  <text x="565" y="530" font-family="sans-serif" font-size="22" font-weight="500" fill="#333" text-anchor="middle">4</text>

  <!-- START label at (1,1) -->
  <text x="115" y="425" font-family="serif" font-size="26" font-weight="500" fill="#c4b99a" text-anchor="middle" font-variant="small-caps" letter-spacing="3">Start</text>

  <!-- Stone/Wall block at (2,2) -->
  <rect x="205" y="210" width="120" height="120" rx="6" fill="#b0a898" stroke="#8a8274" stroke-width="2.5"/>
  <rect x="212" y="217" width="106" height="106" rx="4" fill="#c5bdb0" stroke="#9e978a" stroke-width="1.5"/>
  <line x1="215" y1="260" x2="315" y2="260" stroke="#9e978a" stroke-width="1" opacity="0.5"/>
  <line x1="260" y1="220" x2="260" y2="260" stroke="#9e978a" stroke-width="1" opacity="0.4"/>
  <line x1="240" y1="260" x2="240" y2="320" stroke="#9e978a" stroke-width="1" opacity="0.4"/>
  <line x1="290" y1="260" x2="290" y2="320" stroke="#9e978a" stroke-width="1" opacity="0.4"/>

  <!-- Diamond (+1) at (4,3) -->
  <polygon points="565,70 600,110 565,150 530,110" fill="#2878E0" stroke="#1a5ab0" stroke-width="2"/>
  <line x1="540" y1="110" x2="590" y2="110" stroke="#5ca0f0" stroke-width="1.5" opacity="0.6"/>
  <line x1="565" y1="70" x2="548" y2="110" stroke="#5ca0f0" stroke-width="1" opacity="0.5"/>
  <line x1="565" y1="70" x2="582" y2="110" stroke="#5ca0f0" stroke-width="1" opacity="0.5"/>
  <line x1="548" y1="110" x2="565" y2="150" stroke="#5ca0f0" stroke-width="1" opacity="0.4"/>
  <line x1="582" y1="110" x2="565" y2="150" stroke="#5ca0f0" stroke-width="1" opacity="0.4"/>
  <circle cx="555" cy="92" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="548" cy="86" r="1.5" fill="#ffffff" opacity="0.5"/>
  <text x="565" y="116" font-family="sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">+1</text>

  <!-- Fire/Explosion (-1) at (4,2) -->
  <rect x="494" y="198" width="138" height="142" rx="4" fill="#8b5e3a" opacity="0.7"/>
  <polygon points="565,210 580,240 610,230 590,260 620,270 590,285 610,310 575,295 565,330 555,295 520,310 540,285 510,270 540,260 520,230 550,240" fill="#F5A623" stroke="#E8593C" stroke-width="2"/>
  <polygon points="565,230 575,250 595,245 582,265 600,272 582,282 595,300 572,290 565,310 558,290 535,300 548,282 530,272 548,265 535,245 555,250" fill="#FCDE5A" opacity="0.8"/>
  <text x="565" y="272" font-family="sans-serif" font-size="28" font-weight="700" fill="#C04828" text-anchor="middle" dominant-baseline="central">-1</text>

  <!-- Robot at (3,1) -->
  <circle cx="415" cy="420" r="32" fill="#9ca3a8" stroke="#6b7378" stroke-width="2"/>
  <circle cx="415" cy="420" r="24" fill="#b8bfc4" stroke="#7d858a" stroke-width="1.5"/>
  <circle cx="415" cy="416" r="14" fill="#e8eaec" stroke="#6b7378" stroke-width="2"/>
  <circle cx="415" cy="416" r="8" fill="#3a3e42" stroke="#555b60" stroke-width="1"/>
  <circle cx="415" cy="416" r="4" fill="#d63030"/>
  <line x1="388" y1="400" x2="375" y2="388" stroke="#7d858a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="373" cy="386" r="4" fill="#9ca3a8" stroke="#6b7378" stroke-width="1"/>
  <line x1="442" y1="400" x2="455" y2="388" stroke="#7d858a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="457" cy="386" r="4" fill="#9ca3a8" stroke="#6b7378" stroke-width="1"/>

  <!-- Direction arrows -->
  <polygon points="415,350 425,370 418,370 418,380 412,380 412,370 405,370" fill="#3dcc3d" stroke="#2a9e2a" stroke-width="1"/>
  <polygon points="345,420 365,410 365,417 375,417 375,423 365,423 365,430" fill="#3dcc3d" stroke="#2a9e2a" stroke-width="1"/>
  <polygon points="485,420 465,410 465,417 455,417 455,423 465,423 465,430" fill="#3dcc3d" stroke="#2a9e2a" stroke-width="1"/>
</svg>
